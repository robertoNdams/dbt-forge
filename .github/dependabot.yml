version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "robertoNdams"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Bundle dev tooling bumps so we don't drown in PRs
      dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "pre-commit"
      runtime:
        patterns:
          - "pydantic"
          - "click"
          - "rich"
          - "pyyaml"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    reviewers:
      - "robertoNdams"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "actions/*"
