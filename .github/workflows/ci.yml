name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + type check — single job, fastest feedback
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[lint]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Ruff (format check)
        run: ruff format --check src tests

      - name: mypy
        run: mypy

  # ---------------------------------------------------------------------------
  # 2. Unit tests — matrix across supported Python versions
  # ---------------------------------------------------------------------------
  unit:
    name: Unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit \
            --cov=dbt_forge_cli \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage artifact (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 3. Integration tests — real dbt-duckdb run on the example project
  # ---------------------------------------------------------------------------
  integration:
    name: Integration (dbt-duckdb)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + integration deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,integration]"

      - name: Run integration suite
        run: pytest tests/integration -m integration -v

  # ---------------------------------------------------------------------------
  # 4. Build wheel + sdist — store as artifacts (no PyPI publish here)
  # ---------------------------------------------------------------------------
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build --wheel --sdist

      - name: Inspect distributions
        run: |
          ls -la dist/
          python -m pip install pkginfo
          python -c "from pkginfo import Wheel; w = Wheel('dist/' + [f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]); print('Wheel:', w.name, w.version)"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14
