repos:
  # Standard hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # dbt config files use Jinja, which trips PyYAML's strict parser
        exclude: ^(dbt/dbt_forge/|examples/.+/(profiles\.yml|dbt_project\.yml))
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Lint + format Python via ruff (single tool, fast)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type-check on commit (only the package, not tests — tests run in CI)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^src/dbt_forge_cli/
        additional_dependencies:
          - pydantic>=2.6
          - types-PyYAML
          - click
          - rich

ci:
  autofix_prs: true
  autoupdate_schedule: monthly
